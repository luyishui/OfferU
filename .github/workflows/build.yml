name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: offeru-frontend
          path: frontend/out
          if-no-files-found: warn

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile run_server.py

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: offeru-backend
          path: |
            backend/
            !backend/__pycache__/
            !backend/**/__pycache__/
            !backend/**/*.pyc
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create archive
        run: |
          mkdir -p release
          tar czf release/offeru-frontend.tar.gz -C offeru-frontend .
          tar czf release/offeru-backend.tar.gz -C offeru-backend .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OfferU ${{ github.ref_name }}
          draft: true
          files: |
            release/offeru-frontend.tar.gz
            release/offeru-backend.tar.gz
