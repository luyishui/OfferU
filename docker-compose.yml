# =============================================
# OfferU - Docker Compose 编排
# =============================================
# 一键启动所有服务：PostgreSQL + FastAPI后端 + Next.js前端
# 使用方式：docker compose up -d
# =============================================

services:
  # ---- PostgreSQL 数据库 ----
  db:
    image: postgres:16-alpine
    container_name: offeru-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-offeru}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-offeru_secret}
      POSTGRES_DB: ${DB_NAME:-offeru}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-offeru}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- FastAPI 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: offeru-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-offeru}:${DB_PASSWORD:-offeru_secret}@db:5432/${DB_NAME:-offeru}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - APIFY_API_KEY=${APIFY_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ---- Next.js 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: offeru-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
